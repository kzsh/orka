# orka user defaults
#
# Copy this file to ${XDG_CONFIG_HOME:-~/.config}/orka/config.yaml
#
# Values here act as defaults: any flag supplied on the command line or via
# environment variable takes precedence over what is set here.
#
# Supported keys:
#
#   engine          - backend to use              (docker | podman | nerdctl | bubblewrap)
#   harness         - agent harness to launch      (pi | claude | codex)
#   harness-version - harness version to install   (e.g. 1.2.3; pi harness only)
#   no_browser      - omit agent-browser extension (true | false; pi harness only)
#   pi-path         - absolute path to pi binary   (bubblewrap backend only)
#   claude-path     - absolute path to claude      (bubblewrap backend only)
#   codex-path      - absolute path to codex       (bubblewrap backend only)

# engine: podman
# harness: pi
# harness-version: latest
# no_browser: false
# pi-path: ~/.bun/bin/pi
# claude-path: /usr/local/bin/claude
# codex-path: /usr/local/bin/codex
